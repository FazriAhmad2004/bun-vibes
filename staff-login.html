<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Staff Login</title>

<link rel="stylesheet"
href="staff-login.css">

</head>

<body>

<div class="login-container">

    <div class="login-box">

        <h1>BUN VIBES</h1>

        <h2>Staff Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Username">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <select id="role">

            <option value="">
                Select Role
            </option>

            <option value="owner">
                owner
            </option>

            <option value="cashier">
                cashier
            </option>

            <option value="kitchen">
                kitchen
            </option>

        </select>

        <button onclick="login()">

            Login

        </button>

        <p id="message"></p>

    </div>

</div>

<script>

async function login() {

    const username =
    document.getElementById(
        "username"
    ).value;

    const password =
    document.getElementById(
        "password"
    ).value;

    const role =
    document.getElementById(
        "role"
    ).value;

    if(
        !username ||
        !password ||
        !role
    ) {

        return alert(
            "Fill all fields"
        );
    }

    try {

        const res = await fetch(

            "https://focused-rebirth-production-6a18.up.railway.app/login",

            {

                method: "POST",

                headers: {

                    "Content-Type":
                    "application/json"

                },

                body: JSON.stringify({

                    username,
                    password,
                    role

                })
            }
        );

        const data =
        await res.json();

        if(data.success) {

            localStorage.setItem(
                "staffRole",
                data.role
            );

            localStorage.setItem(
                "loggedIn",
                true
            );

            /* REDIRECT */

            if(data.role === "owner") {

                window.location.href =
                "owner-panel-fazri.html";
            }

            else if(
                data.role === "cashier"
            ) {

                window.location.href =
                "cashier.html";
            }

            else if(
                data.role === "kitchen"
            ) {

                window.location.href =
                "kitchen.html";
            }
        }

        else {

            document.getElementById(
                "message"
            ).innerText =

            "Invalid Login Details";
        }
    }

    catch(err) {

        console.log(err);
    }
}

</script>

</body>
</html>
